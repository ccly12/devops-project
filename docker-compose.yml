version: '3.8'

services:
  # --- AMBIENTE DE DESARROLLO ---
  db-dev:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb_dev
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend-dev:
    build: ./backend
    deploy:
      replicas: 2  # <--- Esto es el Escalamiento Declarativo para Dev
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db-dev
      DB_USER: myuser
      DB_PASSWORD: mypassword
      DB_NAME: mydb_dev
    depends_on:
      - db-dev

  # --- AMBIENTE DE PRODUCCIÓN ---
  db-prod:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb_prod
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  backend-prod:
    build: ./backend
    deploy:
      replicas: 2  # <--- Esto es el Escalamiento Declarativo para Producción
    ports:
      - "80:3000" 
    environment:
      DB_HOST: db-prod
      DB_USER: myuser
      DB_PASSWORD: mypassword
      DB_NAME: mydb_prod
    depends_on:
      - db-prod

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"

volumes:
  db_data_dev:
  db_data_prod: